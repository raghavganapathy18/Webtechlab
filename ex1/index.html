<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craft.Co</title>
<style>
  :root{
    --pink-bg: #fbe4f9;
    --pink-panel: #f6dcf3;
    --ink: #1a1a1a;
    --muted: #4a4a4a;
    --border: #d9a9d4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background:#fff;
  }


  header{
    background: var(--pink-bg);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 28px 48px;
  }
  .logo{
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin:0;
  }
  nav{
    display:flex;
    gap: 40px;
  }
  nav a{
    color: var(--ink);
    text-decoration:none;
    font-size: 19px;
    font-weight: 500;
  }


  main{
    display:grid;
    grid-template-columns: 460px 1fr;
    background: var(--pink-bg);
  }

  .sidebar{
    padding: 32px 32px 32px 48px;
    display:flex;
    flex-direction:column;
    gap: 20px;
  }
  .card{
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 24px 28px;
    background: var(--pink-panel);
  }
  .card h2{
    font-size: 22px;
    font-family: '', Times, serif;
    font-weight: 800;
    margin: 0 0 12px 0;
    letter-spacing: 0.5px;
  }
  .card p{
    margin: 0 0 18px 0;
    font-size: 15px;
    line-height: 1.5;
    color: var(--muted);
  }
  .card p:last-child{ margin-bottom:0; }
  .card .contact-lines p{
    margin: 2px 0;
  }

  .craft-card{
    text-align:center;
    padding-bottom: 0;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .craft-card h2{
    padding-top: 4px;
    margin-bottom: 20px;
  }
  .craft-card .photoframe{
    border-radius: 0 0 16px 16px;
    overflow:hidden;
    margin: 0 -28px -1px -28px;
    flex:1;
  }
  .craft-card .photoframe img{
    width:100%;
    height:100%;
    display:block;
    object-fit: cover;
    min-height: 420px;
  }

  .gallery{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 0;
    overflow: hidden;
  }
  .gallery figure{
    margin:0;
    overflow:hidden;
    background:#e9c9e4;
  }
  .gallery img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .row1 figure{ height: 328px; }
  .row2 figure{ height: 380px; }

  footer{
    text-align:center;
    padding: 0px 24px;
    font-weight: 600;
    font-size: 15px;
    height: 80px;
    line-height: 80px;
    color: var(--ink);
    background: #ffa2ec;
  }

  @media (max-width: 900px){
    main{ grid-template-columns: 1fr; }
    .gallery{ grid-template-columns: repeat(2, 1fr); }
    .sidebar{ padding: 24px; }
  }
</style>
</head>
<body>

  <header>
    <p class="logo">CRAFT.CO</p>
    <nav>
      <a href="#">Home</a>
      <a href="#">Orders</a>
      <a href="#">About</a>
      <a href="#">Settings</a>
    </nav>
  </header>

  <main>
    <aside class="sidebar">
      <div class="card">
        <h2>ABOUT US</h2>
        <p>Craft.Co is an online craft store, explore with this website enjoying vareity of products</p>
        <h2>CONTACT US</h2>
        <div class="contact-lines">
          <p>+91 63433 35676</p>
          <p><a href="mailto:mail@craft.co">mail@craft.co</a></p>
        </div>
      </div>

      <div class="card craft-card">
        <h2>CRAFT OF THE DAY</h2>
        <div class="photoframe">
          <img src="bag1.jpeg">
        </div>
      </div>
    </aside>

    <section class="gallery">
      <div class="row1" style="display:contents">
        <figure><img src="keychain.jpeg" ></figure>
        <figure><img src="bag1.jpeg" ></figure>
        <figure><img src="bag2.jpeg" ></figure>
        <figure><img src="keychain2.jpeg" ></figure>
      </div>
      <div class="row2" style="display:contents">
        <figure><img src="top1.jpeg"></figure>
        <figure><img src="bouque.jpeg" ></figure>
        <figure><img src="doll1.jpeg"></figure>
        <figure><img src="tulips.jpeg" ></figure>
      </div>
      <div class="row2" style="display:contents">
        <figure><img src="images (6).jpeg"></figure>
        <figure><img src="images (7).jpeg" ></figure>
        <figure><img src="images (8).jpeg"></figure>
        <figure><img src="images (9).jpeg" ></figure>
      </div>
    </section>
  </main>
  <footer><a href = " https://www.karunya.edu" > <h6 style="text-align: center"> www.craftstore.co </h6> </a></footer>
</body>
</html>
